<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to WEBP Converter</title>
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-dark: #3a56d4;
            --secondary-color: #7209b7;
            --text-color: #333;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --success-color: #4caf50;
            --error-color: #f44336;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --text-color: #f5f5f5;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: var(--transition);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }

        .upload-area {
            background-color: var(--card-bg);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .upload-area.active {
            border-color: var(--primary-color);
            background-color: rgba(67, 97, 238, 0.05);
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .upload-area h2 {
            margin-bottom: 10px;
        }

        .upload-area p {
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .file-input {
            display: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: #6511a3;
        }

        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .files-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .file-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .file-name {
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .file-size {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .preview-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .preview-box {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            background-color: #f9f9f9;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 100%;
        }

        .preview-label {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
            opacity: 0.7;
        }

        .file-details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .dimension {
            background-color: rgba(67, 97, 238, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 8px 12px;
            font-size: 0.9rem;
        }

        .global-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .global-actions .btn {
            padding: 12px 30px;
        }

        .resize-options {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .resize-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .resize-toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .resize-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .resize-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .resize-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .resize-slider {
            background-color: var(--primary-color);
        }

        input:checked + .resize-slider:before {
            transform: translateX(26px);
        }

        .resize-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .resize-fields.active {
            max-height: 200px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        .field-group label {
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .field-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--card-bg);
            color: var(--text-color);
        }

        .field-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
            color: var(--border-color);
        }

        .progress-bar {
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .success-message {
            color: var(--success-color);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .files-list {
                grid-template-columns: 1fr;
            }
            
            .preview-container {
                flex-direction: column;
            }
            
            .global-actions {
                flex-direction: column;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SVG to WEBP Converter</h1>
            <p class="subtitle">Convert SVG files to WEBP format with lossless quality and exact dimensions</p>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </header>

        <div class="upload-area" id="uploadArea">
            <i>📁</i>
            <h2>Upload SVG Files</h2>
            <p>Drag & drop your SVG files here or click to browse</p>
            <button class="btn" id="uploadBtn">
                <i>📂</i> Choose Files
            </button>
            <input type="file" id="fileInput" class="file-input" accept=".svg" multiple>
        </div>

        <div class="resize-options">
            <div class="resize-header">
                <h3>Resize Options</h3>
                <label class="resize-toggle">
                    <input type="checkbox" id="resizeToggle">
                    <span class="resize-slider"></span>
                </label>
            </div>
            <div class="resize-fields" id="resizeFields">
                <div class="field-group">
                    <label for="widthInput">Width (px)</label>
                    <input type="number" id="widthInput" min="1" disabled>
                </div>
                <div class="field-group">
                    <label for="heightInput">Height (px)</label>
                    <input type="number" id="heightInput" min="1" disabled>
                </div>
            </div>
        </div>

        <div class="files-list" id="filesList">
            <!-- Files will be added here dynamically -->
        </div>

        <div class="global-actions">
            <button class="btn" id="convertAllBtn" disabled>
                <i>🔄</i> Convert All
            </button>
            <button class="btn btn-secondary" id="downloadAllBtn" disabled>
                <i>📦</i> Download All (ZIP)
            </button>
        </div>
    </div>

    <script>
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const filesList = document.getElementById('filesList');
        const convertAllBtn = document.getElementById('convertAllBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const themeToggle = document.getElementById('themeToggle');
        const resizeToggle = document.getElementById('resizeToggle');
        const resizeFields = document.getElementById('resizeFields');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');

        // State
        let files = [];
        let convertedFiles = [];
        let isDarkMode = false;

        // Event Listeners
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        convertAllBtn.addEventListener('click', convertAllFiles);
        downloadAllBtn.addEventListener('click', downloadAllAsZip);
        themeToggle.addEventListener('click', toggleTheme);
        resizeToggle.addEventListener('change', toggleResizeFields);
        widthInput.addEventListener('input', updateHeightProportionally);
        heightInput.addEventListener('input', updateWidthProportionally);

        // File Handling
        function handleFileSelect(e) {
            const selectedFiles = Array.from(e.target.files);
            processFiles(selectedFiles);
        }

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('active');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            if (!uploadArea.contains(e.relatedTarget)) {
                uploadArea.classList.remove('active');
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('active');
            const droppedFiles = Array.from(e.dataTransfer.files);
            processFiles(droppedFiles);
        }

        function processFiles(fileList) {
            const svgFiles = fileList.filter(file => file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg'));
            
            if (svgFiles.length === 0) {
                alert('Please select valid SVG files.');
                return;
            }

            files = [...files, ...svgFiles];
            renderFilesList();
            updateGlobalButtons();
        }

        // Rendering
        function renderFilesList() {
            if (files.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <i>📄</i>
                        <p>No files uploaded yet</p>
                    </div>
                `;
                return;
            }

            filesList.innerHTML = files.map((file, index) => `
                <div class="file-card" data-index="${index}">
                    <div class="file-header">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${formatFileSize(file.size)}</div>
                    </div>
                    <div class="preview-container">
                        <div class="preview-col">
                            <div class="preview-box">
                                <img src="${URL.createObjectURL(file)}" alt="${file.name}">
                            </div>
                            <div class="preview-label">Original SVG</div>
                        </div>
                        <div class="preview-col">
                            <div class="preview-box" id="preview-${index}">
                                ${file.converted ? `<img src="${file.converted.dataUrl}" alt="Converted ${file.name}">` : '<span>Not converted yet</span>'}
                            </div>
                            <div class="preview-label">Converted WEBP</div>
                        </div>
                    </div>
                    <div class="file-details">
                        <div class="dimension">${file.width || '?'} × ${file.height || '?'} px</div>
                        <div class="status" id="status-${index}">
                            ${file.converted ? '<span class="success-message">✓ Converted</span>' : '<span>Ready to convert</span>'}
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" id="progress-${index}" style="width: ${file.converted ? '100%' : '0%'}"></div>
                    </div>
                    <div class="file-actions">
                        <button class="btn" onclick="convertFile(${index})" ${file.converted ? 'disabled' : ''}>
                            <i>🔄</i> Convert
                        </button>
                        <button class="btn btn-secondary" onclick="downloadFile(${index})" ${file.converted ? '' : 'disabled'}>
                            <i>💾</i> Download
                        </button>
                        <button class="btn" onclick="removeFile(${index})" style="background-color: #f44336;">
                            <i>🗑️</i> Remove
                        </button>
                    </div>
                </div>
            `).join('');

            // Extract dimensions for each file
            files.forEach((file, index) => {
                if (!file.width || !file.height) {
                    extractSvgDimensions(file, index);
                }
            });
        }

        function extractSvgDimensions(file, index) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const svgText = e.target.result;
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
                const svgElement = svgDoc.documentElement;
                
                let width = svgElement.getAttribute('width');
                let height = svgElement.getAttribute('height');
                
                // If width/height attributes are not present, try viewBox
                if (!width || !height) {
                    const viewBox = svgElement.getAttribute('viewBox');
                    if (viewBox) {
                        const viewBoxParts = viewBox.split(' ');
                        width = viewBoxParts[2];
                        height = viewBoxParts[3];
                    }
                }
                
                // If still no dimensions, use default
                if (!width || !height) {
                    width = '300';
                    height = '150';
                }
                
                // Remove units if present (e.g., "100px" -> "100")
                width = width.replace(/[^\d.-]/g, '');
                height = height.replace(/[^\d.-]/g, '');
                
                files[index].width = parseInt(width);
                files[index].height = parseInt(height);
                
                // Update the display
                const dimensionElement = document.querySelector(`[data-index="${index}"] .dimension`);
                if (dimensionElement) {
                    dimensionElement.textContent = `${files[index].width} × ${files[index].height} px`;
                }
                
                // Update resize inputs if this is the first file
                if (index === 0 && !resizeToggle.checked) {
                    widthInput.value = files[index].width;
                    heightInput.value = files[index].height;
                }
            };
            reader.readAsText(file);
        }

        // Conversion
        async function convertFile(index) {
            const file = files[index];
            const progressBar = document.getElementById(`progress-${index}`);
            const statusElement = document.getElementById(`status-${index}`);
            
            try {
                statusElement.innerHTML = '<span>Converting...</span>';
                progressBar.style.width = '0%';
                
                // Read SVG file
                const svgText = await readFileAsText(file);
                
                // Get dimensions
                let width = file.width;
                let height = file.height;
                
                // Use custom dimensions if resize is enabled
                if (resizeToggle.checked) {
                    width = parseInt(widthInput.value) || width;
                    height = parseInt(heightInput.value) || height;
                }
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Create image from SVG
                const img = new Image();
                img.onload = function() {
                    // Draw image to canvas
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Convert to WEBP
                    const dataUrl = canvas.toDataURL('image/webp', 1.0);
                    
                    // Update file object
                    file.converted = {
                        dataUrl: dataUrl,
                        blob: dataURLToBlob(dataUrl),
                        width: width,
                        height: height
                    };
                    
                    // Update UI
                    const previewElement = document.getElementById(`preview-${index}`);
                    previewElement.innerHTML = `<img src="${dataUrl}" alt="Converted ${file.name}">`;
                    
                    statusElement.innerHTML = '<span class="success-message">✓ Converted</span>';
                    progressBar.style.width = '100%';
                    
                    // Update actions
                    const convertBtn = document.querySelector(`[data-index="${index}"] .file-actions .btn`);
                    const downloadBtn = document.querySelector(`[data-index="${index}"] .file-actions .btn.btn-secondary`);
                    convertBtn.disabled = true;
                    downloadBtn.disabled = false;
                    
                    // Update global buttons
                    updateGlobalButtons();
                };
                
                img.onerror = function() {
                    throw new Error('Failed to load SVG image');
                };
                
                // Create blob URL for the image
                const blob = new Blob([svgText], { type: 'image/svg+xml' });
                img.src = URL.createObjectURL(blob);
                
                // Simulate progress
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 5;
                    progressBar.style.width = `${progress}%`;
                    if (progress >= 90) clearInterval(progressInterval);
                }, 100);
                
            } catch (error) {
                console.error('Conversion error:', error);
                statusElement.innerHTML = `<span class="error-message">Error: ${error.message}</span>`;
                progressBar.style.width = '0%';
            }
        }

        function convertAllFiles() {
            files.forEach((file, index) => {
                if (!file.converted) {
                    convertFile(index);
                }
            });
        }

        // Download
        function downloadFile(index) {
            const file = files[index];
            if (!file.converted) return;
            
            const link = document.createElement('a');
            link.download = file.name.replace('.svg', '.webp');
            link.href = file.converted.dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function downloadAllAsZip() {
            // Check if JSZip is available
            if (typeof JSZip === 'undefined') {
                alert('ZIP functionality requires JSZip library. Please include it in your project.');
                return;
            }
            
            const zip = new JSZip();
            
            files.forEach(file => {
                if (file.converted) {
                    const filename = file.name.replace('.svg', '.webp');
                    zip.file(filename, file.converted.blob);
                }
            });
            
            try {
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.download = 'converted-webp-files.zip';
                link.href = URL.createObjectURL(content);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error('ZIP creation error:', error);
                alert('Error creating ZIP file: ' + error.message);
            }
        }

        // Utility Functions
        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsText(file);
            });
        }

        function dataURLToBlob(dataUrl) {
            const arr = dataUrl.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function removeFile(index) {
            files.splice(index, 1);
            renderFilesList();
            updateGlobalButtons();
        }

        function updateGlobalButtons() {
            const hasFiles = files.length > 0;
            const allConverted = files.length > 0 && files.every(file => file.converted);
            const someConverted = files.some(file => file.converted);
            
            convertAllBtn.disabled = !hasFiles || allConverted;
            downloadAllBtn.disabled = !someConverted;
        }

        // Theme Toggle
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            themeToggle.textContent = isDarkMode ? '☀️' : '🌙';
        }

        // Resize Options
        function toggleResizeFields() {
            if (resizeToggle.checked) {
                resizeFields.classList.add('active');
                widthInput.disabled = false;
                heightInput.disabled = false;
                
                // Set default values from first file if available
                if (files.length > 0 && files[0].width && files[0].height) {
                    widthInput.value = files[0].width;
                    heightInput.value = files[0].height;
                }
            } else {
                resizeFields.classList.remove('active');
                widthInput.disabled = true;
                heightInput.disabled = true;
            }
        }

        function updateHeightProportionally() {
            if (!resizeToggle.checked || files.length === 0) return;
            
            const width = parseInt(widthInput.value);
            if (isNaN(width) || width <= 0) return;
            
            const originalWidth = files[0].width;
            const originalHeight = files[0].height;
            const ratio = originalHeight / originalWidth;
            
            heightInput.value = Math.round(width * ratio);
        }

        function updateWidthProportionally() {
            if (!resizeToggle.checked || files.length === 0) return;
            
            const height = parseInt(heightInput.value);
            if (isNaN(height) || height <= 0) return;
            
            const originalWidth = files[0].width;
            const originalHeight = files[0].height;
            const ratio = originalWidth / originalHeight;
            
            widthInput.value = Math.round(height * ratio);
        }

        // Initialize
        function init() {
            // Check for dark mode preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleTheme();
            }
            
            // Load JSZip if available
            if (typeof JSZip === 'undefined') {
                console.warn('JSZip not loaded. Download All (ZIP) functionality will not work.');
            }
        }

        // Run initialization
        init();
    </script>
